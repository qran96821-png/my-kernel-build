name: Build Extreme Gaming Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git wget python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev flex bison libncurses-dev

      - name: Download Toolchain & Source
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_vayu kernel-source

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          export LD_LIBRARY_PATH=$(pwd)/clang/lib:$LD_LIBRARY_PATH
          cd kernel-source
          make O=out ARCH=arm64 vendor/vayu_user_defconfig
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1
          
